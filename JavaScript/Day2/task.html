    // Create an arrow function that accepts two numbers and returns:

    // Sum
    // Difference
    // Multiplication
    // Division

    const calC = (num1 = 0 , num2 = 0)=>{

        const sumNum = num1 + num2;
        const subNum = num1 - num2;
        const mulNum = num1 * num2;
        const divNum = num1 / num2;

        return {add : sumNum , sub : subNum , mul : mulNum , div : divNum}

    }

    // Create an arrow function that accepts marks of 5 subjects and returns the total and average.

    const result = (...marks)=>{
        // total
        let totalMarks = 0;
        for (number of marks){
    
            totalMarks += number;

        }
        const avgMark = totalMarks/marks.length
        return {totalMarks : totalMarks , avgMark : avgMark}
    }
