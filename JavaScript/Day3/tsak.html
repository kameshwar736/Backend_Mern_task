    <script>
    // Task 1 - Bank Account Using Closure
    // Create a closure-based bank account system.
    // Features:
    // Initial Balance = 5000
    // Deposit Amount
    // Withdraw Amount
    // Check Balance
    // Use closure to keep balance private.


    const bankAcc = ()=>{
        let balance = 5000;

        return {
            depositAmt : (amt)=>(
                balance += amt
        ),
            withdrawAmt : (amt)=>(
                balance -= amt
        ),
            checkBalance : ()=>(
                  balance  
        )
            
        }
        
    }

//    console.log( bankAcc().checkBalance());
   
    // Task 2 - Student Attendance Counter
    // Create a closure that maintains attendance count.
    // Requirements:
    // Every function call increases attendance.
    // Display current attendance count.
    // Count should not reset.

    const studentAttend = () => {
            let count = 0;
            let markAttend = () => {
                count++
                return count
                 
            }
            markAttend()
        }

        console.log(studentAttend());
    

    </script>
